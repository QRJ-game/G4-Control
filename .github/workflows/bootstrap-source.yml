name: Import source tree

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false
      - name: Record actual repair part hashes
        shell: bash
        run: |
          set -u
          git checkout -B main origin/main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          {
            echo "Actual repair part SHA-256 values:"
            sha256sum .bootstrap/repair/*.part
          } > REPAIR_DIAGNOSTIC.txt
          git add REPAIR_DIAGNOSTIC.txt
          git commit -m "Record repair part diagnostics" || true
          git push origin main

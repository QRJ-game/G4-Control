name: Expand source tree

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  expand:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false
      - name: Diagnose source expansion on main
        shell: bash
        run: |
          set +e
          git checkout -B main origin/main
          checkout_rc=$?
          b64_size=$(wc -c < .bootstrap/G4-Control-source.zip.b64 2>/dev/null)
          base64 -d .bootstrap/G4-Control-source.zip.b64 > /tmp/G4-Control-source.zip 2>/tmp/base64.err
          decode_rc=$?
          zip_size=$(wc -c < /tmp/G4-Control-source.zip 2>/dev/null)
          unzip -t /tmp/G4-Control-source.zip >/tmp/unzip.out 2>&1
          unzip_test_rc=$?
          {
            echo "checkout_rc=$checkout_rc"
            echo "b64_size=$b64_size"
            echo "decode_rc=$decode_rc"
            echo "zip_size=$zip_size"
            echo "unzip_test_rc=$unzip_test_rc"
            echo "base64_error=$(tr '\n' ' ' </tmp/base64.err)"
            echo "unzip_output=$(tail -n 5 /tmp/unzip.out | tr '\n' ' ')"
          } > BOOTSTRAP_DIAGNOSTIC.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BOOTSTRAP_DIAGNOSTIC.txt
          git commit -m "Record source bootstrap diagnostic"
          git push origin main
          exit 0

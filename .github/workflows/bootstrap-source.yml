name: Expand source tree

on:
  push:
    branches: [main]
  issues:
    types: [opened]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  expand:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Expand source archive on main
        run: |
          git checkout main
          git pull --ff-only origin main
          if [ ! -f .bootstrap/G4-Control-source.zip.b64 ]; then
            echo "Bootstrap archive is absent; nothing to expand."
            exit 0
          fi
          base64 -d .bootstrap/G4-Control-source.zip.b64 > /tmp/G4-Control-source.zip
          unzip -o /tmp/G4-Control-source.zip -d .
          rm -rf .bootstrap .github/workflows/bootstrap-source.yml
          rm -f payload/g4-helper.b64
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Import G4 Control v0.9.2 Public Beta"
          git push origin main
